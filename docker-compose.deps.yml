# Postgres + Redis uniquement — pour dev local (make deps)
# Backend : make dev-backend  |  Frontend : make dev-frontend

services:
  postgres:
    image: postgres:16-alpine
    container_name: mig_postgres
    environment:
      POSTGRES_USER: madeingoun
      POSTGRES_PASSWORD: madeingoun
      POSTGRES_DB: madeingoun
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U madeingoun -d madeingoun"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mig_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
